<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오늘의 기분 날씨 ☁️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Gowun Dodum',sans-serif;
  background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:28px 16px 48px;
  color:#fff;
}

.app{width:100%;max-width:390px}

/* ── SCREENS ── */
.screen{width:100%}
.screen.hidden{display:none!important}

/* ── SELECTION ── */
.sel-header{text-align:center;margin-bottom:24px;padding-top:8px}
.sel-header h1{
  font-family:'Noto Serif KR',serif;
  font-size:24px;font-weight:700;
  letter-spacing:-.5px;margin-bottom:6px;
}
.sel-header p{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:.3px}

.progress{display:flex;justify-content:center;gap:10px;margin-bottom:22px}
.dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,.18);
  transition:all .3s ease;
}
.dot.filled{background:#fff;transform:scale(1.25);box-shadow:0 0 8px rgba(255,255,255,.5)}

.emoji-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:9px;
  margin-bottom:20px;
}

.emoji-btn{
  aspect-ratio:1;border:none;
  background:rgba(255,255,255,.07);
  border-radius:16px;
  font-size:28px;
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;
  border:2px solid transparent;
  padding:8px 4px 6px;
  transition:background .15s,border-color .15s,opacity .2s;
  position:relative;
}
.emoji-btn .lbl{font-size:10px;color:rgba(255,255,255,.45);line-height:1}
.emoji-btn:active{transform:scale(.9)}
.emoji-btn.selected{
  background:rgba(255,255,255,.16);
  border-color:rgba(255,255,255,.55);
}
.emoji-btn.selected::after{
  content:'✓';position:absolute;
  top:4px;right:7px;
  font-size:10px;color:rgba(255,255,255,.75);
}
.emoji-btn.disabled-btn{opacity:.28;pointer-events:none}

@keyframes pop{
  0%{transform:scale(1)}
  40%{transform:scale(1.28)}
  70%{transform:scale(.94)}
  100%{transform:scale(1.05)}
}
.emoji-btn.pop{animation:pop .28s ease forwards}

.selected-bar{
  background:rgba(255,255,255,.06);
  border-radius:16px;
  padding:13px 16px;
  margin-bottom:18px;
  display:flex;align-items:center;gap:12px;
}
.bar-label{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap}
.selected-slots{display:flex;gap:8px;flex:1;justify-content:center}
.slot{
  width:46px;height:46px;
  border-radius:13px;
  border:2px dashed rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  transition:all .25s ease;
}
.slot.filled{border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.09)}

.btn-forecast{
  width:100%;padding:16px;border:none;
  border-radius:16px;
  font-family:'Gowun Dodum',sans-serif;
  font-size:16px;font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;letter-spacing:.5px;
  transition:all .25s ease;
  opacity:.35;pointer-events:none;
  box-shadow:0 6px 20px rgba(102,126,234,0);
}
.btn-forecast.active{
  opacity:1;pointer-events:all;
  box-shadow:0 8px 28px rgba(102,126,234,.45);
}
.btn-forecast.active:active{transform:scale(.97)}

/* ── RESULT ── */
.result-screen{display:flex;flex-direction:column;align-items:center;gap:16px}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

.card-wrap{
  width:100%;display:flex;justify-content:center;
  animation:fadeUp .5s ease forwards;
}

/* 9:16 card */
.weather-card{
  width:min(360px,100%);
  aspect-ratio:9/16;
  border-radius:28px;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  padding:32px 26px 28px;
  box-shadow:0 24px 64px rgba(0,0,0,.55);
}

.card-deco{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.07);pointer-events:none;
}
.deco1{width:280px;height:280px;top:-100px;right:-80px}
.deco2{width:200px;height:200px;bottom:-70px;left:-60px}
.deco3{width:120px;height:120px;top:48%;left:-30px}

/* Particles */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{
  position:absolute;
  animation:rise linear infinite;
  opacity:0;
  font-size:16px;
  line-height:1;
}
@keyframes rise{
  0%{transform:translateY(110%) rotate(0deg);opacity:0}
  10%{opacity:.8}
  85%{opacity:.6}
  100%{transform:translateY(-20%) rotate(360deg);opacity:0}
}

.card-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  position:relative;z-index:1;margin-bottom:auto;
}
.card-date-main{font-size:15px;font-weight:600;color:rgba(255,255,255,.92);margin-bottom:2px}
.card-date-sub{font-size:12px;color:rgba(255,255,255,.55)}
.card-badge{
  background:rgba(255,255,255,.14);
  backdrop-filter:blur(8px);
  border-radius:20px;padding:4px 12px;
  font-size:11px;color:rgba(255,255,255,.75);letter-spacing:.5px;
}

.card-main{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;z-index:1;
  padding:12px 0;
}
.card-icon{
  font-size:72px;line-height:1;margin-bottom:10px;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.25));
  animation:float 3.5s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-9px)}
}
.card-temp{
  font-family:'Noto Serif KR',serif;
  font-size:58px;font-weight:700;
  color:#fff;letter-spacing:-2px;line-height:1;margin-bottom:6px;
}
.card-wname{
  font-size:17px;font-weight:600;
  color:rgba(255,255,255,.82);letter-spacing:2.5px;
}

.card-emojis{
  display:flex;justify-content:center;gap:10px;
  margin:14px 0;position:relative;z-index:1;
}
.card-ei{
  width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  border:1.5px solid rgba(255,255,255,.2);
  backdrop-filter:blur(4px);
}

.card-msg{position:relative;z-index:1;text-align:center;margin-bottom:14px}
.card-headline{
  font-family:'Noto Serif KR',serif;
  font-size:15px;font-weight:600;
  line-height:1.6;margin-bottom:6px;
  color:rgba(255,255,255,.95);
}
.card-sub{font-size:12px;color:rgba(255,255,255,.6);line-height:1.7}

.card-stats{
  display:flex;justify-content:space-around;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
  border-radius:14px;padding:11px 6px;
  margin-bottom:14px;position:relative;z-index:1;
}
.stat-val{font-size:15px;font-weight:700;color:#fff;text-align:center}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.5);text-align:center;margin-top:2px;letter-spacing:.2px}

.card-footer{
  display:flex;justify-content:space-between;align-items:center;
  position:relative;z-index:1;
}
.card-brand{font-size:11px;color:rgba(255,255,255,.38);letter-spacing:.4px}
.card-ftime{font-size:11px;color:rgba(255,255,255,.38)}

/* Action buttons */
.action-btns{
  display:flex;gap:10px;
  width:min(360px,100%);
  animation:fadeUp .5s .18s ease both;
}
.btn-save{
  flex:1;padding:15px;border:none;border-radius:14px;
  font-family:'Gowun Dodum',sans-serif;
  font-size:15px;font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,#f093fb,#f5576c);
  color:#fff;
  box-shadow:0 6px 22px rgba(240,147,251,.35);
  transition:all .2s;
}
.btn-save:active{transform:scale(.97)}
.btn-save:disabled{opacity:.6;cursor:not-allowed}
.btn-reset{
  padding:15px 20px;
  border:2px solid rgba(255,255,255,.18);
  border-radius:14px;
  font-family:'Gowun Dodum',sans-serif;
  font-size:15px;cursor:pointer;
  background:transparent;color:rgba(255,255,255,.65);
  transition:all .2s;
}
.btn-reset:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="app">

  <!-- 선택 화면 -->
  <div class="screen" id="selScreen">
    <div class="sel-header">
      <h1>🌤️ 오늘의 기분 날씨</h1>
      <p>이모지 3개를 선택하면 날씨 예보를 알려드려요</p>
    </div>

    <div class="progress">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>

    <div class="emoji-grid" id="grid"></div>

    <div class="selected-bar">
      <span class="bar-label">선택한 기분</span>
      <div class="selected-slots">
        <div class="slot" id="s0"></div>
        <div class="slot" id="s1"></div>
        <div class="slot" id="s2"></div>
      </div>
    </div>

    <button class="btn-forecast" id="btnGo">예보 보기 🌈</button>
  </div>

  <!-- 결과 화면 -->
  <div class="screen hidden" id="resScreen">
    <div class="card-wrap">
      <div class="weather-card" id="wCard"></div>
    </div>
    <div class="action-btns">
      <button class="btn-save" id="btnSave">📸 저장하기</button>
      <button class="btn-reset" id="btnReset">🔄 다시</button>
    </div>
  </div>

</div>

      {head:'오늘 당신의 내면은\n초강력 폭풍우 직격탄.',sub:'외출 자제, 집에서 쉬는 날.\n좋아하는 것으로 위로 권고.',stats:[['폭풍','100%'],['기력','↓↓'],['처방','치유']]},
      {head:'삼중 부정 기압골 합류.\n내면 폭풍 역대 최강.',sub:'오늘은 누가 뭐래도 쉬세요.\n내일의 당신을 위해.',stats:[['감정','폭풍'],['회복','시작'],['내일','기대']]},
      {head:'모든 것이 힘든 오늘.\n폭풍우는 반드시 지나갑니다.',sub:'지금 이 순간만 버티면 됩니다.\n당신 잘 하고 있어요.',stats:[['힘듦','인정'],['버팀','진행중'],['응원','전달']]},
    ],
  },
  {
    id:'neutral',match:(_,c)=>c.neutral>=2,
    icon:'🌫️',temp:'18°',name:'짙은 안개',
    grad:['#606c88','#3f4c6b'],ptc:['🌫️','💭','⭐'],
    vars:[
      {head:'오늘 당신의 내면은\n방향을 잃은 짙은 안개.',sub:'감정의 나침반을 찾는 중.\n오후 자기 성찰 소나기 예보.',stats:[['방향','모름'],['감정','안개'],['답','탐색중']]},
      {head:'무감동 안개가 내면을 덮음.\n기쁘지도 슬프지도 않음.',sub:'그래도 괜찮습니다.\n이런 날도 필요해요.',stats:[['감정','0도'],['상태','안개'],['결론','그냥']]},
    ],
  },
  {
    id:'default',match:()=>true,
    icon:'⛅',temp:'20°',name:'구름 많음',
    grad:['#8e9eab','#eef2f3'],ptc:['⛅','☁️','🌬️'],
    vars:[
      {head:'오늘 당신의 내면은\n구름이 많고 복잡함.',sub:'다양한 감정이 교차하는 하루.\n천천히 걸어가세요.',stats:[['날씨','흐림'],['감정','복합'],['기분','보통']]},
      {head:'뭔가 묘한 기운이 내면에 맴돔.\n구름이 많고 애매한 하루.',sub:'억지로 정의하지 않아도 됩니다.\n흘러가는 대로.',stats:[['기운','묘함'],['구름','많음'],['결론','글쎄']]},
    ],
  },
];

let sel = [];

function buildGrid() {
  const g = document.getElementById('grid');
  EMOJIS.forEach(({e,l}) => {
    const b = document.createElement('button');
    b.className = 'emoji-btn';
    b.dataset.e = e;
    b.innerHTML = `<span>${e}</span><span class="lbl">${l}</span>`;
    b.addEventListener('click', () => toggle(e, b));
    g.appendChild(b);
  });
}

function toggle(emoji, btn) {
  if (sel.includes(emoji)) {
    sel = sel.filter(e => e !== emoji);
    btn.classList.remove('selected','pop');
  } else {
    if (sel.length >= 3) return;
    sel.push(emoji);
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('selected','pop');
  }
  syncUI();
}

function syncUI() {
  for (let i = 0; i < 3; i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < sel.length);
    const s = document.getElementById('s'+i);
    s.textContent = sel[i] || '';
    s.classList.toggle('filled', !!sel[i]);
  }
  const btn = document.getElementById('btnGo');
  btn.classList.toggle('active', sel.length === 3);
  document.querySelectorAll('.emoji-btn').forEach(b => {
    b.classList.toggle('disabled-btn', sel.length === 3 && !sel.includes(b.dataset.e));
  });
}

function getCase() {
  const c = {pos:0,neg:0,neutral:0,sleep:0};
  sel.forEach(e => {
    const f = EMOJIS.find(x => x.e === e);
    if (!f) return;
    if (f.t === 'positive') c.pos++;
    else if (f.t === 'negative') c.neg++;
    else if (f.t === 'neutral') c.neutral++;
    else if (f.t === 'sleep') c.sleep++;
  });
  return CASES.find(ca => ca.match(sel, c)) || CASES[CASES.length-1];
}

function getDateStr() {
  const n = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const h = n.getHours();
  const ampm = h < 12 ? '오전' : '오후';
  const hh = h % 12 || 12;
  return {
    date: `${n.getMonth()+1}월 ${n.getDate()}일 (${days[n.getDay()]})`,
    time: `${ampm} ${hh}시`,
  };
}

function showResult() {
  const ca = getCase();
  const v = pick(ca.vars);
  const {date, time} = getDateStr();

  const stops = ca.grad.map((c,i) =>
    `${c} ${Math.round(i/(ca.grad.length-1)*100)}%`
  ).join(',');

  const card = document.getElementById('wCard');
  card.style.background = `linear-gradient(160deg,${stops})`;

  const ptcHtml = Array.from({length:10}, (_,i) => {
    const sym = ca.ptc[i % ca.ptc.length];
    const left = 5 + Math.random()*85;
    const dur = 5 + Math.random()*7;
    const delay = -(Math.random()*8);
    const size = 12 + Math.random()*10;
    return `<div class="particle" style="left:${left}%;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s">${sym}</div>`;
  }).join('');

  const statsHtml = v.stats.map(([l,val]) =>
    `<div><div class="stat-val">${val}</div><div class="stat-lbl">${l}</div></div>`
  ).join('');

  const emojisHtml = sel.map(e =>
    `<div class="card-ei">${e}</div>`
  ).join('');

  card.innerHTML = `
    <div class="particles">${ptcHtml}</div>
    <div class="card-deco deco1"></div>
    <div class="card-deco deco2"></div>
    <div class="card-deco deco3"></div>
    <div class="card-top">
      <div>
        <div class="card-date-main">${date}</div>
        <div class="card-date-sub">${time} 기준</div>
      </div>
      <div class="card-badge">기분 날씨</div>
    </div>
    <div class="card-main">
      <div class="card-icon">${ca.icon}</div>
      <div class="card-temp">${ca.temp}</div>
      <div class="card-wname">${ca.name}</div>
    </div>
    <div class="card-emojis">${emojisHtml}</div>
    <div class="card-msg">
      <div class="card-headline">${v.head.replace(/\n/g,'<br>')}</div>
      <div class="card-sub">${v.sub.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="card-stats">${statsHtml}</div>
    <div class="card-footer">
      <div class="card-brand">오늘의 기분 날씨 ☁️</div>
      <div class="card-ftime">${time}</div>
    </div>
  `;

  document.getElementById('selScreen').classList.add('hidden');
  document.getElementById('resScreen').classList.remove('hidden');
}

async function saveImg() {
  const btn = document.getElementById('btnSave');
  const card = document.getElementById('wCard');
  btn.textContent = '저장 중...';
  btn.disabled = true;

  try {
    const canvas = await html2canvas(card, {
      scale: 3,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false,
      ignoreElements: el => el.classList.contains('particles'),
    });

    const d = new Date();
    const filename = `기분날씨_${d.getMonth()+1}${d.getDate()}.png`;

    // iOS Safari: Web Share API로 사진 앱 저장
    if (navigator.canShare) {
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
      const file = new File([blob], filename, { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: '오늘의 기분 날씨' });
        return;
      }
    }

    // 그 외: 다운로드
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch (e) {
    if (e?.name !== 'AbortError') alert('저장 실패. 다시 시도해주세요.');
  } finally {
    btn.textContent = '📸 저장하기';
    btn.disabled = false;
  }
}

function reset() {
  sel = [];
  document.querySelectorAll('.emoji-btn').forEach(b =>
    b.classList.remove('selected','pop','disabled-btn')
  );
  syncUI();
  document.getElementById('resScreen').classList.add('hidden');
  document.getElementById('selScreen').classList.remove('hidden');
}

buildGrid();
syncUI();
document.getElementById('btnGo').addEventListener('click', showResult);
document.getElementById('btnSave').addEventListener('click', saveImg);
document.getElementById('btnReset').addEventListener('click', reset);
</script>
</body>
